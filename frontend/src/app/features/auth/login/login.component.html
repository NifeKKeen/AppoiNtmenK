    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <a routerLink="/" class="back-link">← Back</a>
          <h1 class="auth-title">Welcome Back</h1>
          <p class="auth-subtitle">Sign in to access the SOS Hub</p>
        </div>
    
        <form (ngSubmit)="onLogin()" class="auth-form" id="login-form">
          <div class="form-group">
            <label for="username">Username</label>
            <input
              type="text"
              id="username"
              [(ngModel)]="username"
              name="username"
              placeholder="Enter your username"
              required
              />
          </div>
          <div class="form-group">
            <label for="password">Password</label>
            <input
              type="password"
              id="password"
              [(ngModel)]="password"
              name="password"
              placeholder="Enter your password"
              required
              />
          </div>
    
          @if (error) {
            <div class="error-msg" id="login-error">{{ error }}</div>
          }
    
          <button type="submit" class="btn btn-primary btn-full" id="login-submit-btn" [disabled]="loading">
            {{ loading ? 'Signing in...' : '🔑 Sign In' }}
          </button>
        </form>
    
        <p class="auth-footer">
          Don't have an account? <a routerLink="/register">Register here</a>
        </p>
      </div>
    </div>
