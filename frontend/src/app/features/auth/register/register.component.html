    <div class="auth-page">
      <div class="auth-card">
        <div class="auth-header">
          <a routerLink="/" class="back-link">← Back</a>
          <h1 class="auth-title">Create Account</h1>
          <p class="auth-subtitle">Join the Campus SOS Hub</p>
        </div>
    
        <form (ngSubmit)="onRegister()" class="auth-form" id="register-form">
          <div class="form-group">
            <label for="reg-username">Username</label>
            <input
              type="text"
              id="reg-username"
              [(ngModel)]="username"
              name="username"
              placeholder="Choose a username"
              required
              />
          </div>
          <div class="form-group">
            <label for="reg-email">Email</label>
            <input
              type="email"
              id="reg-email"
              [(ngModel)]="email"
              name="email"
              placeholder="your@email.com"
              required
              />
          </div>
          <div class="form-group">
            <label for="reg-password">Password</label>
            <input
              type="password"
              id="reg-password"
              [(ngModel)]="password"
              name="password"
              placeholder="Min 8 characters"
              required
              />
          </div>
    
          @if (error) {
            <div class="error-msg" id="register-error">{{ error }}</div>
          }
          @if (success) {
            <div class="success-msg" id="register-success">{{ success }}</div>
          }
    
          <button type="submit" class="btn btn-primary btn-full" id="register-submit-btn" [disabled]="loading">
            {{ loading ? 'Creating account...' : '🚀 Register' }}
          </button>
        </form>
    
        <p class="auth-footer">
          Already have an account? <a routerLink="/login">Sign in</a>
        </p>
      </div>
    </div>
